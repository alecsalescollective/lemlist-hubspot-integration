name: Nurture Automation (Daily)

on:
  schedule:
    - cron: "0 15 * * *"  # 15:00 UTC daily (8am MST)
  workflow_dispatch:

concurrency:
  group: nurture-automation
  cancel-in-progress: false

jobs:
  nurture-sync:
    name: Trigger nurture automation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger /api/cron/nurture-automation
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "Missing required secret: API_BASE_URL"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing required secret: CRON_SECRET"
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            --request POST \
            --url "${API_BASE_URL}/api/cron/nurture-automation" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            --header "Content-Type: application/json"
